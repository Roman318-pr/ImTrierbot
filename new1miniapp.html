<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Cases · TON + Firebase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            background: #1a1a2f;
            padding: 15px 20px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #2a2a3f;
        }

        .balance {
            color: #0088cc;
            font-size: 20px;
            font-weight: bold;
        }

        .balance small {
            color: #666;
            font-size: 12px;
            display: block;
        }

        .connect-btn {
            background: #0088cc;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .connect-btn.connected {
            background: #1a1a2f;
            border: 2px solid #0088cc;
            color: #0088cc;
        }

        .connect-btn:active {
            transform: scale(0.95);
        }

        /* Информация о кошельке */
        .wallet-info {
            background: #1a1a2f;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #2a2a3f;
            word-break: break-all;
        }

        .wallet-address {
            color: #0088cc;
            font-family: monospace;
        }

        /* Сетка кейсов */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .case-card {
            background: #1a1a2f;
            border-radius: 25px;
            padding: 20px 15px;
            text-align: center;
            border: 2px solid #2a2a3f;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .case-card.free {
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ff6b6b);
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .case-card:hover::before {
            opacity: 1;
        }

        .case-card.selected {
            border-color: transparent;
        }

        .case-card.selected::before {
            opacity: 1;
        }

        .case-emoji {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .case-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .case-price {
            color: #0088cc;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .case-price.free {
            color: #2ecc71;
        }

        .case-items-preview {
            display: flex;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: #888;
            flex-wrap: wrap;
        }

        .case-items-preview span {
            background: #0f0f1a;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .free-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #2ecc71;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-btn {
            flex: 1;
            background: #2ecc71;
            border: none;
            padding: 16px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .action-btn.secondary {
            background: #3498db;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Комнаты */
        .rooms-section {
            background: #1a1a2f;
            border-radius: 30px;
            padding: 20px;
            border: 1px solid #2a2a3f;
        }

        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .rooms-title {
            color: #888;
            font-size: 16px;
        }

        .refresh-btn {
            background: #2a2a3f;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:active {
            background: #3a3a4f;
        }

        .rooms-list {
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #2a2a3f;
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-item:hover {
            background: #2a2a3f;
            border-radius: 20px;
        }

        .room-item:last-child {
            border-bottom: none;
        }

        .room-creator {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .room-details {
            color: #888;
            font-size: 12px;
        }

        .room-join-btn {
            background: #0088cc;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        .room-join-btn.free {
            background: #2ecc71;
        }

        .loading-spinner {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        .no-rooms {
            text-align: center;
            padding: 30px;
            color: #888;
            font-style: italic;
        }

        /* Батл комната (скрыта по умолчанию) */
        .battle-room {
            background: #1a1a2f;
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #2a2a3f;
            display: none;
        }

        .battle-room.active {
            display: block;
        }

        .main-view {
            display: block;
        }

        .main-view.hidden {
            display: none;
        }

        .battle-title {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .battle-type {
            text-align: center;
            margin-bottom: 15px;
        }

        .test-badge {
            background: #2ecc71;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
        }

        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .player-card {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #2a2a3f;
        }

        .player-card.you {
            border-color: #0088cc;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.3);
        }

        .player-name {
            font-weight: 600;
            margin-bottom: 10px;
            color: #888;
        }

        .player-gift {
            font-size: 50px;
            margin: 10px 0;
        }

        .player-value {
            color: #2ecc71;
            font-size: 20px;
            font-weight: 700;
        }

        .vs-divider {
            text-align: center;
            font-size: 30px;
            color: #888;
            margin: 15px 0;
        }

        .battle-status {
            text-align: center;
            color: #2ecc71;
            margin: 15px 0;
            font-weight: 600;
        }

        .winner-section {
            background: linear-gradient(45deg, #f1c40f, #e67e22);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .winner-section h2 {
            color: white;
            margin: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .opening-animation {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #0088cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .back-btn {
            width: 100%;
            background: #e74c3c;
            border: none;
            padding: 15px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
    <!-- TON Connect -->
    <script src="https://unpkg.com/@tonconnect/ui@2.0.3/dist/tonconnect-ui.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

</head>
<body>
    <div class="container">
        <!-- Основное представление -->
        <div id="mainView" class="main-view">
            <!-- Шапка -->
            <div class="header">
                <div class="balance">
                    <span id="balance">0</span> TON
                    <small id="walletStatus">не подключен</small>
                </div>
                <button class="connect-btn" id="connectBtn">🔌 Подключить</button>
            </div>

            <!-- Информация о кошельке -->
            <div class="wallet-info" id="walletInfo" style="display: none;">
                <div>Адрес: <span class="wallet-address" id="walletAddress"></span></div>
                <div style="margin-top: 5px; color: #888; font-size: 12px;">ID: <span id="userId"></span></div>
            </div>

            <!-- Сетка кейсов -->
            <div class="cases-grid" id="casesGrid"></div>

            <!-- Кнопки -->
            <div class="buttons">
                <button class="action-btn" id="createBtn" disabled>🎮 СОЗДАТЬ</button>
                <button class="action-btn secondary" id="quickBtn" disabled>⚡ БЫСТРЫЙ</button>
            </div>

            <!-- Комнаты -->
            <div class="rooms-section">
                <div class="rooms-header">
                    <span class="rooms-title">📋 АКТИВНЫЕ КОМНАТЫ</span>
                    <button class="refresh-btn" id="refreshRoomsBtn">🔄 Обновить</button>

                <div class="rooms-list" id="roomsList">
                    <div class="loading-spinner">⏳ Загрузка...</div>

        <!-- Батл комната (изначально скрыта) -->
        <div id="battleRoom" class="battle-room">
            <div class="battle-title" id="battleTitle">⚔️ БАТЛ</div>

            <div class="battle-type" id="battleType"></div>

            <div class="battle-status" id="battleStatus">⏳ Загрузка...</div>

            <div class="players-grid">
                <div class="player-card you" id="player1Card">
                    <div class="player-name" id="player1Name">ВЫ</div>
                    <div class="player-gift" id="player1Gift">❓</div>
                    <div class="player-value" id="player1Value">-</div>
                </div>
                <div class="player-card" id="player2Card">
                    <div class="player-name" id="player2Name">СОПЕРНИК</div>
                    <div class="player-gift" id="player2Gift">❓</div>
                    <div class="player-value" id="player2Value">-</div>
                </div>
            </div>

            <div class="vs-divider">⚡ VS ⚡</div>

            <button class="back-btn" id="backBtn">← НАЗАД</button>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCYeELUnimdyjt0MRfNYfREkGfrt7gUnao",

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== КЕЙСЫ ==========
        const CASES = {
            test: {
                id: 'test',
                name: '🎯 Тестовый',

                price: 0,

                    { name: 'Durov Cap', value: 885, emoji: '🧢', chance: 20 },
                    { name: 'Heart Locket', value: 896, emoji: '💖', chance: 8 },
                    { name: 'Plush Pepe', value: 4200, emoji: '🐸', chance: 2 }
                ]
            },
            common: {
                id: 'common',

                emoji: '📦',
                price: 1,
                color: '#808080',
                items: [
                    { name: 'Toy Bear', value: 13, emoji: '🧸', chance: 60 },
                    { name: 'Swiss Watch', value: 67, emoji: '⌚', chance: 30 },
                    { name: 'Durov Cap', value: 885, emoji: '🧢', chance: 10 }
                ]
            },
            rare: {
                id: 'rare',
                name: '✨ Редкий',
                emoji: '✨',
                price: 5,
                color: '#4169E1',
                items: [
                    { name: 'Durov Cap', value: 885, emoji: '🧢', chance: 50 },
                    { name: 'Heart Locket', value: 896, emoji: '💖', chance: 35 },

                ]
            },
            epic: {
                id: 'epic',
                name: '🔥 Эпический',
                emoji: '🔥',
                price: 10,
                color: '#9B30FF',
                items: [
                    { name: 'Heart Locket', value: 896, emoji: '💖', chance: 55 },
                    { name: 'Plush Pepe', value: 4200, emoji: '🐸', chance: 40 },
                    { name: 'Golden Bear', value: 10000, emoji: '🐻', chance: 5 }
                ]
            },
            legendary: {
                id: 'legendary',
                name: '👑 Легендарный',
                emoji: '👑',
                price: 50,
                color: '#FFD700',
                items: [
                    { name: 'Plush Pepe', value: 4200, emoji: '🐸', chance: 50 },
                    { name: 'Golden Bear', value: 10000, emoji: '🐻', chance: 40 },
                    { name: 'Diamond Ring', value: 25000, emoji: '💍', chance: 10 }
                ]
            }
        };

        // Адрес для получения платежей
        const RECIPIENT_ADDRESS = 'UQBjrnhS04mxMkEpYGngrd_UnypAFaQaKQcpf81BuQEJs1-i';

        // ========== СОСТОЯНИЕ ==========
        let tonConnectUI = null;
        let walletConnected = false;
        let walletAddress = '';
        let tonBalance = 0;
        let selectedCase = 'test';
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);
        const userName = 'Player_' + Math.random().toString(36).substr(2, 6);
        let roomsListener = null;
        let currentRoomId = null;

        // ========== ЭЛЕМЕНТЫ ==========
        const mainView = document.getElementById('mainView');
        const battleRoom = document.getElementById('battleRoom');
        const balanceEl = document.getElementById('balance');
        const connectBtn = document.getElementById('connectBtn');
        const createBtn = document.getElementById('createBtn');
        const quickBtn = document.getElementById('quickBtn');
        const roomsList = document.getElementById('roomsList');
        const walletInfo = document.getElementById('walletInfo');
        const walletAddressEl = document.getElementById('walletAddress');
        const userIdEl = document.getElementById('userId');
        const walletStatus = document.getElementById('walletStatus');
        const casesGrid = document.getElementById('casesGrid');
        const refreshRoomsBtn = document.getElementById('refreshRoomsBtn');
        const backBtn = document.getElementById('backBtn');

        // Элементы батл комнаты
        const battleTitle = document.getElementById('battleTitle');
        const battleType = document.getElementById('battleType');
        const battleStatus = document.getElementById('battleStatus');
        const player1Name = document.getElementById('player1Name');
        const player1Gift = document.getElementById('player1Gift');
        const player1Value = document.getElementById('player1Value');
        const player2Name = document.getElementById('player2Name');
        const player2Gift = document.getElementById('player2Gift');
        const player2Value = document.getElementById('player2Value');

        // ========== ФУНКЦИИ ==========
        function showMessage(msg) {
            if (window.Telegram?.WebApp?.showPopup) {
                window.Telegram.WebApp.showPopup({ message: msg });
            } else {
                alert(msg);
            }
        }

        function updateUI() {
            if (walletConnected) {
                balanceEl.textContent = tonBalance.toFixed(2);
                walletStatus.textContent = 'подключен';
                walletInfo.style.display = 'block';
                walletAddressEl.textContent = walletAddress.slice(0, 6) + '...' + walletAddress.slice(-4);
                userIdEl.textContent = userId.slice(0, 8);
                createBtn.disabled = false;
                quickBtn.disabled = false;
                connectBtn.textContent = '✓ Подключен';
                connectBtn.classList.add('connected');
            } else {
                balanceEl.textContent = '0';
                walletStatus.textContent = 'не подключен';
                walletInfo.style.display = 'none';
                createBtn.disabled = true;
                quickBtn.disabled = true;
                connectBtn.textContent = '🔌 Подключить';
                connectBtn.classList.remove('connected');
            }
        }

        // ========== ОТОБРАЖЕНИЕ КЕЙСОВ ==========
        function renderCases() {
            casesGrid.innerHTML = '';

            Object.values(CASES).forEach(caseData => {
                const caseEl = document.createElement('div');
                caseEl.className = `case-card ${caseData.isFree ? 'free' : ''} ${selectedCase === caseData.id ? 'selected' : ''}`;
                caseEl.setAttribute('data-case', caseData.id);

                const previewItems = caseData.items.slice(0, 3).map(item =>
                    `<span>${item.emoji} ${item.value}</span>`
                ).join('');

                caseEl.innerHTML = `
                    ${caseData.isFree ? '<div class="free-badge">FREE</div>' : ''}
                    <div class="case-emoji">${caseData.emoji}</div>
                    <div class="case-name">${caseData.name}</div>
                    <div class="case-price ${caseData.isFree ? 'free' : ''}">
                        ${caseData.isFree ? 'БЕСПЛАТНО' : caseData.price + ' TON'}
                    </div>
                    <div class="case-items-preview">
                        ${previewItems}
                    </div>
                `;

                caseEl.onclick = () => {
                    selectedCase = caseData.id;
                    document.querySelectorAll('.case-card').forEach(c => c.classList.remove('selected'));
                    caseEl.classList.add('selected');
                };

                casesGrid.appendChild(caseEl);
            });
        }

        // ========== TON CONNECT ==========
        async function initTonConnect() {
            try {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://roman318-pr.github.io/ImTrierbot/tonconnect-manifest.json',
                    buttonRootId: 'connectBtn'
                });

                tonConnectUI.onStatusChange((wallet) => {
                    if (wallet) {
                        walletConnected = true;
                        walletAddress = wallet.account.address;
                        fetchBalance(wallet.account.address);
                    } else {
                        walletConnected = false;
                        walletAddress = '';
                        tonBalance = 0;
                        updateUI();
                    }
                });
            } catch (error) {
                console.error('Ошибка TON Connect:', error);
            }
        }

        async function fetchBalance(address) {
            try {
                const response = await fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${address}`);
                const data = await response.json();
                if (data.ok) {
                    tonBalance = data.result / 1e9;
                    updateUI();
                }
            } catch (error) {
                console.error('Ошибка баланса:', error);
            }
        }

        async function sendTransaction(amount) {
            if (amount === 0) return true;

            if (!tonConnectUI || !walletConnected) {
                showMessage('❌ Кошелек не подключен');
                return false;
            }

            try {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: RECIPIENT_ADDRESS,
                        amount: (amount * 1e9).toString(),
                        payload: 'Battle Cases'
                    }]
                };

                showMessage(`💰 Отправка ${amount} TON...`);
                const result = await tonConnectUI.sendTransaction(transaction);
                return true;
            } catch (error) {
                if (error.message?.includes('rejected')) {
                    showMessage('❌ Транзакция отклонена');
                } else {
                    showMessage('❌ Ошибка транзакции');
                }
                return false;
            }
        }

        // ========== РАБОТА С КОМНАТАМИ FIRBBASE ==========

        // Создание комнаты
        async function createRoom() {
            const caseData = CASES[selectedCase];
            const roomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

            const roomData = {
                id: roomId,
                creator: userId,
                creatorName: userName,
                caseType: selectedCase,
                betAmount: caseData.price,
                isFree: caseData.isFree || false,
                status: 'waiting',
                players: [{
                    id: userId,
                    name: userName,
                    address: walletAddress || ''
                }],
                createdAt: Date.now(),
                expiresAt: Date.now() + 5 * 60 * 1000 // 5 минут
            };

            try {
                await database.ref('rooms/' + roomId).set(roomData);
                showMessage('✅ Комната создана! Ожидаем игрока...');

                // Подписываемся на изменения комнаты
                subscribeToRoom(roomId);

                // Показываем интерфейс комнаты
                showBattleRoom(roomId, 'waiting', caseData);
            } catch (error) {
                console.error('Ошибка создания комнаты:', error);
                showMessage('❌ Ошибка создания комнаты');
            }
        }

        // Поиск доступной комнаты
        async function findAvailableRoom() {
            const caseData = CASES[selectedCase];

            try {
                const snapshot = await database.ref('rooms')
                    .orderByChild('status')
                    .equalTo('waiting')
                    .once('value');

                const rooms = snapshot.val();
                if (!rooms) return null;

                // Ищем комнату с таким же типом кейса
                for (let [id, room] of Object.entries(rooms)) {
                    if (room.caseType === selectedCase &&
                        room.players.length === 1 &&
                        room.creator !== userId) {
                        return { id, ...room };
                    }
                }
                return null;
            } catch (error) {
                console.error('Ошибка поиска комнаты:', error);
                return null;
            }
        }

        // Подключение к комнате
        async function joinRoom(roomId, roomData) {
            const caseData = CASES[roomData.caseType];

            // Отправляем транзакцию если кейс платный
            if (!roomData.isFree) {
                const success = await sendTransaction(caseData.price);
                if (!success) return;
            }

            try {
                // Добавляем игрока в комнату
                const updatedPlayers = [
                    ...roomData.players,
                    {
                        id: userId,
                        name: userName,
                        address: walletAddress || ''
                    }
                ];

                await database.ref('rooms/' + roomId).update({
                    players: updatedPlayers,
                    status: 'full',
                    startedAt: Date.now()
                });

                showMessage('✅ Вы подключились к комнате!');

                // Подписываемся на изменения комнаты
                subscribeToRoom(roomId);

                // Показываем интерфейс комнаты
                showBattleRoom(roomId, 'full', caseData);
            } catch (error) {
                console.error('Ошибка подключения к комнате:', error);
                showMessage('❌ Ошибка подключения к комнате');
            }
        }

        // Подписка на изменения комнаты
        function subscribeToRoom(roomId) {
            if (roomsListener) {
                database.ref('rooms/' + currentRoomId).off('value', roomsListener);
            }

            currentRoomId = roomId;
            roomsListener = database.ref('rooms/' + roomId).on('value', (snapshot) => {
                const room = snapshot.val();
                if (!room) {
                    showMessage('❌ Комната удалена');
                    hideBattleRoom();
                    return;
                }

                // Обновляем интерфейс в зависимости от статуса
                updateRoomUI(room);
            });
        }

        // Обновление UI комнаты
        function updateRoomUI(room) {
            if (!room) return;

            if (room.status === 'full') {
                battleStatus.innerHTML = '🎲 Игрок найден! Начинаем...';
                setTimeout(() => {
                    startBattle(room);
                }, 2000);
            } else if (room.status === 'playing') {
                battleStatus.innerHTML = '⚔️ Битва началась...';
            } else if (room.status === 'finished') {
                battleStatus.innerHTML = '✅ Батл завершен';
            }
        }

        // Начало батла
        async function startBattle(room) {
            battleStatus.innerHTML = '<div class="spinner"></div>Открываем кейсы...';

            await database.ref('rooms/' + room.id).update({
                status: 'playing'
            });

            setTimeout(async () => {
                const player1Item = getRandomItem(room.caseType);
                const player2Item = getRandomItem(room.caseType);

                // Определяем победителя
                let winner = '';
                if (player1Item.value > player2Item.value) {
                    winner = room.players[0].id;
                } else if (player2Item.value > player1Item.value) {
                    winner = room.players[1].id;
                } else {
                    winner = 'draw';
                }

                // Сохраняем результаты
                await database.ref('rooms/' + room.id).update({
                    status: 'finished',
                    results: {
                        [room.players[0].id]: player1Item,
                        [room.players[1].id]: player2Item
                    },
                    winner: winner,
                    finishedAt: Date.now()
                });

                // Обновляем UI
                player1Gift.textContent = player1Item.emoji;
                player1Value.textContent = '⭐ ' + player1Item.value;
                player2Gift.textContent = player2Item.emoji;
                player2Value.textContent = '⭐ ' + player2Item.value;

                let resultText = '';
                if (winner === userId) {
                    resultText = '🏆 ВЫ ПОБЕДИЛИ!';
                    if (!room.isFree) {
                        resultText += ' +' + (room.betAmount * 2) + ' TON';
                    }
                } else if (winner === 'draw') {
                    resultText = '🤝 НИЧЬЯ!';
                    if (!room.isFree) {
                        resultText += ' Возврат ' + room.betAmount + ' TON';
                    }
                } else {
                    resultText = '😢 ВЫ ПРОИГРАЛИ';
                }

                battleStatus.innerHTML = resultText;
            }, 2000);
        }

        // Получение случайного предмета
        function getRandomItem(caseId) {
            const caseData = CASES[caseId];
            const rand = Math.random() * 100;
            let cumulative = 0;

            for (let item of caseData.items) {
                cumulative += item.chance;
                if (rand < cumulative) return item;
            }
            return caseData.items[0];
        }

        // Показать батл комнату
        function showBattleRoom(roomId, status, caseData) {
            mainView.classList.add('hidden');
            battleRoom.classList.add('active');

            battleTitle.textContent = `⚔️ БАТЛ · ${caseData.emoji} ${caseData.name}`;

            if (caseData.isFree) {
                battleType.innerHTML = '<span class="test-badge">🎯 ТЕСТОВЫЙ РЕЖИМ (бесплатно)</span>';
            } else {
                battleType.innerHTML = '';
            }

            battleStatus.textContent = status === 'waiting' ? '⏳ Ожидание игрока...' : '🎲 Подготовка...';

            player1Name.textContent = `ВЫ (${userName})`;
            player2Name.textContent = status === 'waiting' ? 'Ожидание...' : 'СОПЕРНИК';

            player1Gift.textContent = '❓';
            player1Value.textContent = '-';
            player2Gift.textContent = '❓';
            player2Value.textContent = '-';
        }

        // Скрыть батл комнату
        function hideBattleRoom() {
            mainView.classList.remove('hidden');
            battleRoom.classList.remove('active');
            if (roomsListener) {
                database.ref('rooms/' + currentRoomId).off('value', roomsListener);
                currentRoomId = null;
            }
            loadRooms();
        }

        // Загрузка комнат
        async function loadRooms() {
            roomsList.innerHTML = '<div class="loading-spinner">⏳ Загрузка...</div>';

            try {
                const snapshot = await database.ref('rooms')
                    .orderByChild('status')
                    .equalTo('waiting')
                    .limitToLast(10)
                    .once('value');

                const rooms = snapshot.val();

                if (!rooms || Object.keys(rooms).length === 0) {
                    roomsList.innerHTML = '<div class="no-rooms">😢 Нет активных комнат</div>';
                    return;
                }

                roomsList.innerHTML = '';

                // Сортируем по времени создания (новые сверху)
                const sortedRooms = Object.entries(rooms)
                    .sort(([,a], [,b]) => b.createdAt - a.createdAt);

                for (let [id, room] of sortedRooms) {
                    const caseData = CASES[room.caseType];
                    const roomEl = document.createElement('div');
                    roomEl.className = 'room-item';
                    roomEl.innerHTML = `
                        <div class="room-info">
                            <div class="room-creator">${room.creatorName}</div>
                            <div class="room-details">
                                ${caseData.emoji} ${caseData.name} ·
                                ${room.isFree ? 'БЕСПЛАТНО' : room.betAmount + ' TON'} ·
                                ${Math.floor((Date.now() - room.createdAt) / 60000)} мин назад
                            </div>
                        </div>
                        <div class="room-join-btn ${room.isFree ? 'free' : ''}">
                            ${room.isFree ? 'ТЕСТ' : 'ВОЙТИ'}
                        </div>
                    `;

                    roomEl.onclick = async () => {
                        if (!room.isFree && !walletConnected) {
                            showMessage('❌ Подключите кошелек');
                            return;
                        }

                        await joinRoom(id, room);
                    };

                    roomsList.appendChild(roomEl);
                }
            } catch (error) {
                console.error('Ошибка загрузки комнат:', error);
                roomsList.innerHTML = '<div class="no-rooms">❌ Ошибка загрузки</div>';
            }
        }

        // ========== ОБРАБОТЧИКИ ==========
        connectBtn.onclick = async () => {
            if (!tonConnectUI) await initTonConnect();
            try {
                await tonConnectUI.openModal();
            } catch (error) {}
        };

        createBtn.onclick = async () => {
            const caseData = CASES[selectedCase];

            if (!caseData.isFree && !walletConnected) {
                showMessage('❌ Подключите кошелек');
                return;
            }

            if (!caseData.isFree && tonBalance < caseData.price) {
                showMessage('❌ Недостаточно TON');
                return;
            }

            // Проверяем, есть ли свободная комната
            const availableRoom = await findAvailableRoom();

            if (availableRoom) {
                // Если есть, подключаемся
                await joinRoom(availableRoom.id, availableRoom);
            } else {
                // Если нет, создаем новую
                if (!caseData.isFree) {
                    const success = await sendTransaction(caseData.price);
                    if (!success) return;
                }
                await createRoom();
            }
        };

        quickBtn.onclick = () => {
            createBtn.onclick();
        };

        refreshRoomsBtn.onclick = () => {
            loadRooms();
        };

        backBtn.onclick = () => {
            hideBattleRoom();
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        renderCases();
        loadRooms();
        updateUI();
        initTonConnect();

        // Обновляем список комнат каждые 10 секунд
        setInterval(loadRooms, 10000);
    </script>
</body>
</html>
