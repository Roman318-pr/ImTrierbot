<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Cases · TON + Firebase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2f 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 136, 204, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(46, 204, 113, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            position: relative;
        }

        /* Шапка с эффектом стекла */
        .header {
            background: rgba(26, 26, 47, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .balance {
            color: #0088cc;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 136, 204, 0.3);
        }

        .balance small {
            color: #888;
            font-size: 12px;
            display: block;
        }

        .connect-btn {
            background: linear-gradient(135deg, #0088cc, #0066aa);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .connect-btn.connected {
            background: rgba(26, 26, 47, 0.8);
            border: 2px solid #0088cc;
            color: #0088cc;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.3);
        }

        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.4);
        }

        .connect-btn:active {
            transform: translateY(0);
        }

        /* Информация о кошельке */
        .wallet-info {
            background: rgba(26, 26, 47, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            word-break: break-all;
        }

        .wallet-address {
            color: #0088cc;
            font-family: monospace;
            font-size: 12px;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(26, 26, 47, 0.6);
            backdrop-filter: blur(5px);
            padding: 12px 5px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(26, 26, 47, 0.8);
            border-color: rgba(0, 136, 204, 0.3);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #0088cc;
            text-shadow: 0 0 10px rgba(0, 136, 204, 0.3);
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
        }

        /* Сетка кейсов */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .case-card {
            background: rgba(26, 26, 47, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 25px;
            padding: 20px 15px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ff6b6b);
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .case-card:hover {
            transform: translateY(-5px);
        }

        .case-card:hover::before {
            opacity: 1;
        }

        .case-card.selected {
            border-color: transparent;
        }

        .case-card.selected::before {
            opacity: 1;
        }

        .case-emoji {
            font-size: 48px;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        .case-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .case-price {
            color: #0088cc;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .case-price.free {
            color: #2ecc71;
        }

        .case-items-preview {
            display: flex;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: #888;
            flex-wrap: wrap;
        }

        .case-items-preview span {
            background: rgba(15, 15, 26, 0.6);
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .free-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 2px 10px rgba(46, 204, 113, 0.3);
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-btn {
            flex: 1;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 16px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Комнаты */
        .rooms-section {
            background: rgba(26, 26, 47, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .rooms-title {
            color: #888;
            font-size: 16px;
            font-weight: 600;
        }

        .refresh-btn {
            background: rgba(42, 42, 63, 0.8);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .refresh-btn:hover {
            background: rgba(58, 58, 79, 0.8);
            transform: rotate(180deg);
        }

        .rooms-list {
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #0088cc #1a1a2f;
        }

        .rooms-list::-webkit-scrollbar {
            width: 6px;
        }

        .rooms-list::-webkit-scrollbar-track {
            background: #1a1a2f;
            border-radius: 10px;
        }

        .rooms-list::-webkit-scrollbar-thumb {
            background: #0088cc;
            border-radius: 10px;
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 20px;
        }

        .room-item:hover {
            background: rgba(42, 42, 63, 0.8);
            transform: translateX(5px);
        }

        .room-item:last-child {
            border-bottom: none;
        }

        .room-creator {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .room-details {
            color: #888;
            font-size: 12px;
        }

        .room-join-btn {
            background: linear-gradient(135deg, #0088cc, #0066aa);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 2px 10px rgba(0, 136, 204, 0.3);
        }

        .room-join-btn.free {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 2px 10px rgba(46, 204, 113, 0.3);
        }

        .loading-spinner {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        .no-rooms {
            text-align: center;
            padding: 30px;
            color: #888;
            font-style: italic;
        }

        /* Батл комната */
        .battle-room {
            background: rgba(26, 26, 47, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: none;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .battle-room.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-view {
            display: block;
        }

        .main-view.hidden {
            display: none;
        }

        .battle-title {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .battle-type {
            text-align: center;
            margin-bottom: 15px;
        }

        .test-badge {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 2px 10px rgba(46, 204, 113, 0.3);
        }

        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .player-card {
            background: rgba(15, 15, 26, 0.8);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .player-card:hover::before {
            opacity: 1;
        }

        .player-card.you {
            border-color: #0088cc;
            box-shadow: 0 0 30px rgba(0, 136, 204, 0.3);
        }

        .player-name {
            font-weight: 600;
            margin-bottom: 10px;
            color: #888;
        }

        .player-gift {
            font-size: 60px;
            margin: 15px 0;
            filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .player-value {
            color: #2ecc71;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
        }

        .vs-divider {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
            position: relative;
        }

        .vs-divider::before,
        .vs-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .vs-divider::before {
            left: 0;
        }

        .vs-divider::after {
            right: 0;
        }

        .battle-status {
            text-align: center;
            color: #2ecc71;
            margin: 20px 0;
            font-weight: 600;
            font-size: 18px;
            min-height: 60px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #0088cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        .back-btn {
            width: 100%;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            padding: 15px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }

        .back-btn:active {
            transform: translateY(0);
        }

        /* История игр */
        .history-section {
            background: rgba(26, 26, 47, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-title {
            color: #888;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
        }

        .history-item.win {
            border-left: 3px solid #2ecc71;
        }

        .history-item.loss {
            border-left: 3px solid #e74c3c;
        }

        .history-item.draw {
            border-left: 3px solid #f1c40f;
        }

        .history-result {
            font-weight: 600;
        }

        .history-result.win {
            color: #2ecc71;
        }

        .history-result.loss {
            color: #e74c3c;
        }

        .history-result.draw {
            color: #f1c40f;
        }

        .history-date {
            color: #888;
            font-size: 10px;
        }

        /* Конфетти */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            position: absolute;
            top: -10px;
            border-radius: 50%;
            animation: confettiFall 3s linear forwards;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
    <!-- TON Connect -->
    <script src="https://unpkg.com/@tonconnect/ui@2.0.3/dist/tonconnect-ui.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- Основное представление -->
        <div id="mainView" class="main-view">
            <!-- Шапка -->
            <div class="header">
                <div class="balance">
                    <span id="balance">0</span> TON
                    <small id="walletStatus">не подключен</small>
                </div>
                <button class="connect-btn" id="connectBtn">🔌 Подключить</button>
            </div>

            <!-- Информация о кошельке -->
            <div class="wallet-info" id="walletInfo" style="display: none;">
                <div>Адрес: <span class="wallet-address" id="walletAddress"></span></div>
                <div style="margin-top: 5px; color: #888; font-size: 12px;">ID: <span id="userId"></span></div>
            </div>

            <!-- Статистика -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statGames">0</div>
                    <div class="stat-label">Игр</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statWins">0</div>
                    <div class="stat-label">Побед</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statLosses">0</div>
                    <div class="stat-label">Поражений</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statDraws">0</div>
                    <div class="stat-label">Ничьих</div>
                </div>
            </div>

            <!-- Сетка кейсов -->
            <div class="cases-grid" id="casesGrid"></div>

            <!-- Кнопки -->
            <div class="buttons">
                <button class="action-btn" id="createBtn" disabled>🎮 СОЗДАТЬ</button>
                <button class="action-btn secondary" id="quickBtn" disabled>⚡ БЫСТРЫЙ</button>
            </div>

            <!-- Комнаты -->
            <div class="rooms-section">
                <div class="rooms-header">
                    <span class="rooms-title">📋 АКТИВНЫЕ КОМНАТЫ</span>
                    <button class="refresh-btn" id="refreshRoomsBtn">🔄</button>
                </div>
                <div class="rooms-list" id="roomsList">
                    <div class="loading-spinner">⏳ Загрузка...</div>
                </div>
            </div>

            <!-- История игр -->
            <div class="history-section">
                <div class="history-title">📜 ИСТОРИЯ ИГР</div>
                <div class="history-list" id="historyList">
                    <div class="loading-spinner">⏳ Загрузка...</div>
                </div>
            </div>
        </div>

        <!-- Батл комната -->
        <div id="battleRoom" class="battle-room">
            <div class="battle-title" id="battleTitle">⚔️ БАТЛ</div>
            
            <div class="battle-type" id="battleType"></div>
            
            <div class="battle-status" id="battleStatus">⏳ Загрузка...</div>
            
            <div class="players-grid">
                <div class="player-card you" id="player1Card">
                    <div class="player-name" id="player1Name">ВЫ</div>
                    <div class="player-gift" id="player1Gift">❓</div>
                    <div class="player-value" id="player1Value">-</div>
                </div>
                <div class="player-card" id="player2Card">
                    <div class="player-name" id="player2Name">СОПЕРНИК</div>
                    <div class="player-gift" id="player2Gift">❓</div>
                    <div class="player-value" id="player2Value">-</div>
                </div>
            </div>
            
            <div class="vs-divider">⚡ VS ⚡</div>
            
            <button class="back-btn" id="backBtn">← НАЗАД</button>
        </div>
    </div>

        async function sendTransaction(amount) {
            if (amount === 0) return true;
            
            if (!tonConnectUI || !walletConnected) {
                showMessage('❌ Кошелек не подключен');
                return false;
            }

            try {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [{
                        address: RECIPIENT_ADDRESS,
                        amount: (amount * 1e9).toString(),
                        payload: 'Battle Cases'
                    }]
                };

                showMessage(`💰 Отправка ${amount} TON...`);
                const result = await tonConnectUI.sendTransaction(transaction);
                return true;
            } catch (error) {
                if (error.message?.includes('rejected')) {
                    showMessage('❌ Транзакция отклонена');
                } else {
                    showMessage('❌ Ошибка транзакции');
                }
                return false;
            }
        }

                showMessage('❌ Ошибка подключения к комнате');

        // Подписка на изменения комнаты
        function subscribeToRoom(roomId) {
            if (roomsListener) {
                database.ref('rooms/' + currentRoomId).off('value', roomsListener);
            }

            currentRoomId = roomId;
            roomsListener = database.ref('rooms/' + roomId).on('value', (snapshot) => {
                const room = snapshot.val();
                if (!room) {
                    showMessage('❌ Комната удалена');
                    hideBattleRoom();
                    return;
                }

                updateRoomUI(room);
            });

        // Обновление UI комнаты
               
        function updateRoomUI(room) {
            if (!room) return;

            // Обновляем имена игроков если они есть
            if (room.players && room.players.length > 0) {
                if (room.players[0] && room.players[0].id === userId) {
                    player2Name.textContent = room.players[1]?.name || 'СОПЕРНИК';
                } else if (room.players[1] && room.players[1].id === userId) {
                    player2Name.textContent = room.players[0]?.name || 'СОПЕРНИК';
                }
            }

            if (room.status === 'full') {
                battleStatus.innerHTML = '🎲 Игрок найден! Начинаем...';
                setTimeout(() => {
                    startBattle(room);
                }, 2000);
            } else if (room.status === 'playing') {
                battleStatus.innerHTML = '⚔️ Битва началась...';
            } else if (room.status === 'finished') {
                // Если комната уже завершена, просто показываем результаты из Firebase
                // (для случая перезагрузки страницы)
                if (room.results) {
                    if (room.players[0] && room.results[room.players[0].id]) {
                        player1Gift.textContent = room.results[room.players[0].id].emoji;
                        player1Value.textContent = '⭐ ' + room.results[room.players[0].id].value;
                    }
                    
                    if (room.players[1] && room.results[room.players[1].id]) {
                        player2Gift.textContent = room.results[room.players[1].id].emoji;
                        player2Value.textContent = '⭐ ' + room.results[room.players[1].id].value;
                    }
                }
                
                // Не показываем результат повторно, если он уже был показан
                if (battleStatus.innerHTML.includes('Открываем кейсы') || 
                    battleStatus.innerHTML.includes('spinner')) {
                    let resultText = '';
                    if (room.winner === userId) {
                        resultText = '🏆 ВЫ ПОБЕДИЛИ!';
                        if (!room.isFree) {
                            resultText += ' +' + (room.betAmount * 2) + ' TON';
                        }
                    } else if (room.winner === 'draw') {
                        resultText = '🤝 НИЧЬЯ!';
                        if (!room.isFree) {
                            resultText += ' Возврат ' + room.betAmount + ' TON';
                        }
                    } else if (room.winner && room.winner !== userId) {
                        resultText = '😢 ВЫ ПРОИГРАЛИ';
                    }
                    battleStatus.innerHTML = resultText;
                }
            }
        }

        // Начало батла
        async function startBattle(room) {
            battleStatus.innerHTML = '<div class="spinner"></div>🎲 Открываем кейсы...';

            // Генерируем результаты ТОЛЬКО ЗДЕСЬ, один раз
            const player1Item = getRandomItem(room.caseType);
            const player2Item = getRandomItem(room.caseType);

            // Определяем победителя
            let winner = '';
            if (player1Item.value > player2Item.value) {
                winner = room.players[0].id;
            } else if (player2Item.value > player1Item.value) {
                winner = room.players[1].id;
            } else {
                winner = 'draw';
            }

            // Сохраняем результаты в Firebase
            await database.ref('rooms/' + room.id).update({
                status: 'finished',
                results: {
                    [room.players[0].id]: {
                        item: player1Item,
                        value: player1Item.value,
                        emoji: player1Item.emoji,
                        name: player1Item.name
                    },
                    [room.players[1].id]: {
                        item: player2Item,
                        value: player2Item.value,
                        emoji: player2Item.emoji,
                        name: player2Item.name
                    }
                },
                winner: winner,
                finishedAt: Date.now()
            });

            // Показываем результаты сразу (не ждем обновления из Firebase)
            setTimeout(() => {
                // Показываем результаты для каждого игрока
                player1Gift.textContent = player1Item.emoji;
                player1Value.textContent = '⭐ ' + player1Item.value;
                player2Gift.textContent = player2Item.emoji;
                player2Value.textContent = '⭐ ' + player2Item.value;

                let resultText = '';
                let gameResult = '';
                
                if (winner === userId) {
                    resultText = '🏆 ВЫ ПОБЕДИЛИ!';
                    gameResult = 'win';
                    if (!room.isFree) {
                        resultText += ' +' + (room.betAmount * 2) + ' TON';
                    }
                    createConfetti();
                } else if (winner === 'draw') {
                    resultText = '🤝 НИЧЬЯ!';
                    gameResult = 'draw';
                    if (!room.isFree) {
                        resultText += ' Возврат ' + room.betAmount + ' TON';
                    }
                } else {
                    resultText = '😢 ВЫ ПРОИГРАЛИ';
                    gameResult = 'loss';
                }

                battleStatus.innerHTML = resultText;
                
                // Сохраняем в историю
                saveGameToHistory(room, gameResult);
            }, 2000);
        }

        // Получение случайного предмета
        function getRandomItem(caseId) {
            const caseData = CASES[caseId];
            const rand = Math.random() * 100;
            let cumulative = 0;
            
            for (let item of caseData.items) {
                cumulative += item.chance;
                if (rand < cumulative) return item;
            }
            return caseData.items[0];
        }

        // Загрузка комнат
        async function loadRooms() {
            roomsList.innerHTML = '<div class="loading-spinner">⏳ Загрузка...</div>';
            
            try {
                const snapshot = await database.ref('rooms')
                    .orderByChild('status')
                    .equalTo('waiting')
                    .limitToLast(10)
                    .once('value');
                
                const rooms = snapshot.val();
                
                if (!rooms || Object.keys(rooms).length === 0) {
                    roomsList.innerHTML = '<div class="no-rooms">😢 Нет активных комнат</div>';
                    return;
                }

                roomsList.innerHTML = '';
                
                const sortedRooms = Object.entries(rooms)
                    .sort(([,a], [,b]) => b.createdAt - a.createdAt);
                
                for (let [id, room] of sortedRooms) {
                    const caseData = CASES[room.caseType];
                    const roomEl = document.createElement('div');
                    roomEl.className = 'room-item';
                    roomEl.innerHTML = `
                        <div class="room-info">
                            <div class="room-creator">${room.creatorName}</div>
                            <div class="room-details">
                                ${caseData.emoji} ${caseData.name} · 
                                ${room.isFree ? 'БЕСПЛАТНО' : room.betAmount + ' TON'} · 
                                ${Math.floor((Date.now() - room.createdAt) / 60000)} мин назад
                            </div>
                        </div>
                        <div class="room-join-btn ${room.isFree ? 'free' : ''}">
                            ${room.isFree ? 'ТЕСТ' : 'ВОЙТИ'}
                        </div>
                    `;
                    
                    roomEl.onclick = async () => {
                        if (!room.isFree && !walletConnected) {
                            showMessage('❌ Подключите кошелек');
                            return;
                        }
                        
                        await joinRoom(id, room);
                    };
                    
                    roomsList.appendChild(roomEl);
                }
            } catch (error) {
                console.error('Ошибка загрузки комнат:', error);
                roomsList.innerHTML = '<div class="no-rooms">❌ Ошибка загрузки</div>';
            }
        }

        // ========== ОБРАБОТЧИКИ ==========
        connectBtn.onclick = async () => {
            if (!tonConnectUI) await initTonConnect();
            try {
                await tonConnectUI.openModal();
            } catch (error) {}
        };

        createBtn.onclick = async () => {
            const caseData = CASES[selectedCase];
            
            if (!caseData.isFree && !walletConnected) {
                showMessage('❌ Подключите кошелек');
                return;
            }

            if (!caseData.isFree && tonBalance < caseData.price) {
                showMessage('❌ Недостаточно TON');
                return;
            }

            const availableRoom = await findAvailableRoom();
            
            if (availableRoom) {
                await joinRoom(availableRoom.id, availableRoom);
            } else {
                if (!caseData.isFree) {
                    const success = await sendTransaction(caseData.price);
                    if (!success) return;
                }
                await createRoom();
            }
        };

        quickBtn.onclick = () => {

        refreshRoomsBtn.onclick = () => {
            loadRooms();
        };

        backBtn.onclick = () => {
            hideBattleRoom();
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        renderCases();
        loadRooms();
        loadHistory();
        updateUI();
        updateStats();
        initTonConnect();

        setInterval(loadRooms, 10000);
    </script>
</body>
</html>
