<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Cases · Упрощённая версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2f 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка с пользователем */
        .header {
            background: rgba(26, 26, 47, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0088cc, #0066aa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-balance {
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance-icon {
            color: #0088cc;
            font-size: 16px;
        }

        .balance-amount {
            font-weight: 700;
            color: #0088cc;
        }

        .add-balance {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .add-balance:hover {
            background: #0088cc;
        }

        .connect-btn {
            background: linear-gradient(135deg, #0088cc, #0066aa);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .connect-btn.connected {
            background: rgba(26, 26, 47, 0.8);
            border: 2px solid #0088cc;
            color: #0088cc;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.3);
        }

        /* Фильтр кейсов */
        .case-filter {
            background: rgba(26, 26, 47, 0.6);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            border-radius: 30px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-label {
            color: #888;
            font-size: 13px;
        }

        .filter-options {
            display: flex;
            gap: 8px;
        }

        .filter-option {
            background: rgba(42, 42, 63, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-option:hover {
            background: #0088cc;
        }

        .filter-option.active {
            background: #0088cc;
        }

        /* Сетка кейсов */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .case-card {
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2f 100%);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px 12px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /*.case-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ff6b6b);
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }*/
        .case-card:hover {
            transform: translateY(-3px);
            border-color: #0088cc;
            transform: scale(1.05);

        }

        /*.case-card:hover::before {
            opacity: 1;
        }*/

        .case-card.selected {
            border-color: transparent;
        }

        .case-card.selected::before {
            opacity: 1;
        }

        .case-image {
            width: 100px;
            height: 100px;
            margin: 0 auto 8px;
            border-radius: 16px;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(1.05);
            transition: transform 0.2s ease;
        }

        .case-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .case-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 3px;
            color: #fff;
        }

        .case-price {
            color: #0088cc;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .case-price.free {
            color: #2ecc71;
        }

        .case-items-preview {
            display: flex;
            justify-content: center;
            gap: 4px;
            font-size: 9px;
            color: #888;
            flex-wrap: wrap;
        }

        .case-items-preview span {
            background: rgba(15, 15, 26, 0.6);
            padding: 2px 5px;
            border-radius: 12px;
        }

        .free-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 3px 6px;
            border-radius: 16px;
            font-size: 9px;
            font-weight: 700;
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .action-btn {
            flex: 1;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 14px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Комнаты */
        .rooms-section {
            background: rgba(26, 26, 47, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }

        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .rooms-title {
            color: #888;
            font-size: 14px;
            font-weight: 600;
        }

        .refresh-btn {
            background: rgba(42, 42, 63, 0.8);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }

        .rooms-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            border-radius: 16px;
        }

        .room-item:hover {
            background: rgba(42, 42, 63, 0.8);
        }

        .room-creator {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .room-details {
            color: #888;
            font-size: 10px;
        }

        .room-join-btn {
            background: linear-gradient(135deg, #0088cc, #0066aa);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .room-join-btn.free {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        /* Вкладки (ПвП, Розыгрыши, Профиль) - контент */
        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* Заглушки для розыгрышей и профиля */
        .placeholder-content {
            background: rgba(26, 26, 47, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
        }

        /* Батл комната */
        .battle-room {
            background: rgba(26, 26, 47, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: none;
            margin-bottom: 80px;
        }

        .battle-room.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-view {
            display: block;
            padding-bottom: 80px;
        }

        .main-view.hidden {
            display: none;
        }

        .battle-title {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 700;
        }

        .battle-status {
            text-align: center;
            color: #2ecc71;
            margin: 15px 0;
            font-weight: 600;
            min-height: 40px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .player-card {
            background: rgba(15, 15, 26, 0.8);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .player-gift {
            font-size: 50px;
            margin: 10px 0;
        }

        .player-value {
            color: #2ecc71;
            font-weight: 700;
        }

        .vs-divider {
            text-align: center;
            font-size: 24px;
            color: #888;
            margin: 15px 0;
        }

        .back-btn {
            width: 100%;
            background: #e74c3c;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        /* Нижняя навигация (три кнопки) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 47, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px 16px 16px;
            z-index: 100;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 400px;
            margin: 0 auto;
        }

        .nav-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-btn.active {
            color: #0088cc;
        }

        .nav-icon {
            font-size: 24px;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .no-rooms {
            text-align: center;
            padding: 20px;
            color: #888;
            font-style: italic;
        }

        /* Анимации */
        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            top: -10px;
            border-radius: 50%;
            animation: confettiFall 3s linear forwards;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes spinCase {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px #0088cc; }
            50% { box-shadow: 0 0 30px #0088cc, 0 0 60px #2ecc71; }
            100% { box-shadow: 0 0 5px #0088cc; }
        }

        @keyframes itemReveal {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(50px);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .case-opening {
            animation: spinCase 1.5s ease-in-out;
        }

        .case-glow {
            animation: glowPulse 1s ease-in-out infinite;
        }

        .item-reveal {
            animation: itemReveal 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .flash-effect {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9998;
            animation: flash 0.3s ease-out;
        }

        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 0.8; }
            100% { opacity: 0; }
        }
    </style>

    <div class="container">
        <!-- Основное представление (игра, розыгрыши, профиль) -->
        <div id="mainView" class="main-view">
            <!-- Шапка (общая для всех вкладок) -->
            <div class="header">
                <div class="user-profile">

                    </div>
                </div>
                <button class="connect-btn" id="connectBtn">🔌 Подключить</button>
            </div>

            <!-- Вкладка ПвП (игра) -->
            <div id="pvpTab" class="tab-pane active">
                <!-- Фильтр кейсов -->
                <div class="case-filter">
                    <span class="filter-label">Кейсы</span>
                    <div class="filter-options">
                        <span class="filter-option active" onclick="filterCases('all')">Все</span>
                        <span class="filter-option" onclick="filterCases('free')">Free</span>
                        <span class="filter-option" onclick="filterCases('premium')">Premium</span>
                    </div>
                </div>

                <!-- Сетка кейсов -->
                <div class="cases-grid" id="casesGrid"></div>

                <!-- Кнопки -->
                <div class="buttons">
                    <button class="action-btn" id="createBtn" disabled>🎮 СОЗДАТЬ</button>
                    <button class="action-btn secondary" id="quickBtn" disabled>⚡ БЫСТРЫЙ</button>
                </div>

                <!-- Активные комнаты -->
                <div class="rooms-section">
                    <div class="rooms-header">
                        <span class="rooms-title">📋 АКТИВНЫЕ КОМНАТЫ</span>
                        <button class="refresh-btn" id="refreshRoomsBtn">🔄</button>
                    </div>
                    <div class="rooms-list" id="roomsList">
                        <div class="loading-spinner">⏳ Загрузка...</div>
                    </div>
                </div>
            </div>

            <!-- Вкладка Розыгрыши (заглушка) -->
            <div id="giveawaysTab" class="tab-pane">
                <div class="placeholder-content">
                    🎁 Розыгрыши скоро появятся
                </div>
            </div>

            <!-- Вкладка Профиль (заглушка) -->
            <div id="profileTab" class="tab-pane">
                <div class="placeholder-content">
                    👤 Здесь будет ваш профиль и статистика
                </div>
            </div>
        </div>

        <!-- Батл комната (отдельно, перекрывает основной вид) -->
        <div id="battleRoom" class="battle-room">
            <div class="battle-title" id="battleTitle">⚔️ БАТЛ</div>
            <div class="battle-status" id="battleStatus">⏳ Загрузка...</div>
            <div class="players-grid">
                <div class="player-card">
                    <div class="player-name" id="player1Name">ВЫ</div>
                    <div class="player-gift" id="player1Gift">❓</div>
                    <div class="player-value" id="player1Value">-</div>
                </div>
                <div class="player-card">
                    <div class="player-name" id="player2Name">СОПЕРНИК</div>
                    <div class="player-gift" id="player2Gift">❓</div>
                    <div class="player-value" id="player2Value">-</div>
                </div>
            </div>
            <div class="vs-divider">⚡ VS ⚡</div>
            <button class="back-btn" id="backBtn">← НАЗАД</button>
        </div>
    </div>

    <!-- Нижняя навигация (три кнопки) -->
    <div class="bottom-nav">
        <div class="nav-buttons">
            <button class="nav-btn" onclick="switchTab('giveaways')">
                <span class="nav-icon">🎁</span>
                <span>Розыгрыши</span>
            </button>
            <button class="nav-btn active" onclick="switchTab('pvp')">
                <span class="nav-icon">⚔️</span>
                <span>ПвП</span>
            </button>
            <button class="nav-btn" onclick="switchTab('profile')">
                <span class="nav-icon">👤</span>
                <span>Профиль</span>
            </button>
        </div>
    </div>

        async function getRealRandomItem(caseId) {
            const caseData = CASES[caseId];
            if (caseData.isFree) {
                const items = [
                    { name: 'Toy Bear', value: 13, emoji: '🧸', rarity: 'common' },
                    { name: 'Swiss Watch', value: 67, emoji: '⌚', rarity: 'common' },
                    { name: 'Durov Cap', value: 885, emoji: '🧢', rarity: 'rare' },
                    { name: 'Heart Locket', value: 896, emoji: '💖', rarity: 'epic' },
                    { name: 'Plush Pepe', value: 4200, emoji: '🐸', rarity: 'legendary' }
                ];
                return items[Math.floor(Math.random() * items.length)];
            }

            try {
                const response = await fetch('https://market.tonnel.network/api/gifts/getGifts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        gift_name: caseData.apiName,
                        limit: 30,
                        sort: 'price_asc'
                    })
                });
                const gifts = await response.json();
                if (gifts && gifts.length > 0) {
                    const randomGift = gifts[Math.floor(Math.random() * gifts.length)];
                    return {
                        name: randomGift.name,
                        model: randomGift.model,
                        value: randomGift.price,
                        emoji: getEmojiForGift(randomGift.name),
                        rarity: getRarityFromModel(randomGift.model),
                        gift_id: randomGift.gift_id
                    };
                }
            } catch (error) {
                console.error('Ошибка получения реального предмета:', error);
            }
            return { name: 'Unknown', value: 10, emoji: '🎁', rarity: 'common' };
        }

        function getEmojiForGift(name) {
            const emojiMap = {
                'Plush Pepe': '🐸', 'Durov Cap': '🧢', 'Heart Locket': '💖',
                'Toy Bear': '🧸', 'Swiss Watch': '⌚'
            };
            return emojiMap[name] || '🎁';
        }

        function getRarityFromModel(model) {
            if (!model) return 'common';
            const rarityMap = { 'Classic':'common', 'Wizard':'rare', 'Zebra':'rare', 'Panda':'epic',
                'Golden':'legendary', 'Silver':'rare', 'Gold':'epic', 'Diamond':'legendary', 'Platinum':'epic' };
            const cleanModel = model.split(' ')[0];
            return rarityMap[cleanModel] || 'common';
        }

                if (room.players[0] && room.players[0].id === userId) {
                    player2Name.innerHTML = room.players[1]?.name || 'СОПЕРНИК';

                    player2Name.innerHTML = room.players[0]?.name || 'СОПЕРНИК';
                    if (room.players[0]) {
                        player2Name.innerHTML += ` <span style="color:#888; font-size:10px;">(${room.players[0].rating} ELO)</span>`;
                    }
                }
            }
            if (room.status === 'full') {
                battleStatus.innerHTML = '🎲 Игрок найден! Начинаем...';
                setTimeout(() => startBattle(room), 2000);
            } else if (room.status === 'finished') {
                if (room.results) {
                    if (room.players[0] && room.results[room.players[0].id]) {
                        player1Gift.textContent = room.results[room.players[0].id].emoji;

        async function startBattle(room) {
            const caseCard = document.querySelector('.case-card.selected');
            if (caseCard) caseCard.classList.add('case-opening', 'case-glow');
            const flash = document.createElement('div');
            flash.className = 'flash-effect';
            document.body.appendChild(flash);
            battleStatus.innerHTML = '<div class="spinner"></div>🎲 Открываем кейсы...';
            setTimeout(async () => {
                if (caseCard) caseCard.classList.remove('case-opening', 'case-glow');
                flash.remove();
                const player1Item = await getRealRandomItem(room.caseType);
                const player2Item = await getRealRandomItem(room.caseType);
                let winner = '';
                let result = '';
                if (player1Item.value > player2Item.value) {
                    winner = room.players[0].id;
                    result = 'win';
                } else if (player2Item.value > player1Item.value) {
                    winner = room.players[1].id;
                    result = 'loss';
                } else {
                    winner = 'draw';
                    result = 'draw';
                }
                await database.ref('rooms/' + room.id).update({
                    status: 'finished',
                    results: {
                        [room.players[0].id]: { item: player1Item, value: player1Item.value, emoji: player1Item.emoji, name: player1Item.name, model: player1Item.model, rarity: player1Item.rarity },
                        [room.players[1].id]: { item: player2Item, value: player2Item.value, emoji: player2Item.emoji, name: player2Item.name, model: player2Item.model, rarity: player2Item.rarity }
                    },
                    winner: winner,
                    finishedAt: Date.now()
                });
                setTimeout(() => {
                    player1Gift.classList.add('item-reveal');
                    player2Gift.classList.add('item-reveal');
                    player1Gift.textContent = player1Item.emoji;
                    player1Value.textContent = '⭐ ' + player1Item.value;
                    player2Gift.textContent = player2Item.emoji;
                    player2Value.textContent = '⭐ ' + player2Item.value;
                    let resultText = '';
                    let gameResult = '';
                    if (winner === userId) {
                        resultText = '🏆 ВЫ ПОБЕДИЛИ!';
                        gameResult = 'win';
                        if (!room.isFree && room.betAmount > 0) resultText += ' +' + (room.betAmount * 2) + ' TON';
                        createConfetti(50);
                        if (player1Item.value < 100) userStats.luckyWins = (userStats.luckyWins || 0) + 1;
                        if (room.betAmount >= 50) userStats.bigWins = (userStats.bigWins || 0) + 1;
                    } else if (winner === 'draw') {
                        resultText = '🤝 НИЧЬЯ!';
                        gameResult = 'draw';
                        if (!room.isFree && room.betAmount > 0) resultText += ' Возврат ' + room.betAmount + ' TON';
                    } else {
                        resultText = '😢 ВЫ ПРОИГРАЛИ';
                        gameResult = 'loss';
                    }
                    battleStatus.innerHTML = resultText;
                    userStats.games++;
                    if (gameResult === 'win') { userStats.wins++; userStats.winStreak++; }
                    else if (gameResult === 'loss') { userStats.losses++; userStats.winStreak = 0; }
                    else { userStats.draws++; }
                    saveGameToHistory(room, gameResult, player1Item.value);
                    saveUserData();
                    setTimeout(() => {
                        player1Gift.classList.remove('item-reveal');
                        player2Gift.classList.remove('item-reveal');
                    }, 800);
                }, 500);
            }, 1500);
        }

        async function loadRooms() {
            roomsList.innerHTML = '<div class="loading-spinner">⏳ Загрузка...</div>';
            try {
                const snapshot = await database.ref('rooms')
                    .orderByChild('status')
                    .equalTo('waiting')
                    .limitToLast(10)
                    .once('value');
                const rooms = snapshot.val();
                if (!rooms || Object.keys(rooms).length === 0) {
                    roomsList.innerHTML = '<div class="no-rooms">😢 Нет активных комнат</div>';
                    return;
                }
                roomsList.innerHTML = '';
                const sortedRooms = Object.entries(rooms).sort(([,a], [,b]) => b.createdAt - a.createdAt);
                for (let [id, room] of sortedRooms) {
                    const caseData = CASES[room.caseType];
                    const roomEl = document.createElement('div');
                    roomEl.className = 'room-item';
                    roomEl.innerHTML = `
                        <div class="room-info">
                            <div class="room-creator">${room.creatorName} <span style="color:#888; font-size:10px;">(${room.creatorRating} ELO)</span></div>
                            <div class="room-details">
                                ${caseData.emoji} ${caseData.name} ·
                                ${room.isFree ? 'БЕСПЛАТНО' : room.betAmount + ' TON'} ·
                                ${Math.floor((Date.now() - room.createdAt) / 60000)} мин назад
                            </div>
                        </div>
                        <div class="room-join-btn ${room.isFree ? 'free' : ''}">
                            ${room.isFree ? 'ТЕСТ' : 'ВОЙТИ'}
                        </div>
                    `;
                    roomEl.onclick = async () => {
                        if (!room.isFree && !walletConnected) {
                            showMessage('❌ Подключите кошелек');
                            return;
                        }
                        await joinRoom(id, room);
                    };
                    roomsList.appendChild(roomEl);
                }
            } catch (error) {
                console.error('Ошибка загрузки комнат:', error);
                roomsList.innerHTML = '<div class="no-rooms">❌ Ошибка загрузки</div>';
            }
        }

        };

        createBtn.onclick = async () => {
            const caseData = CASES[selectedCase];
            if (!caseData.isFree && !walletConnected) {
                showMessage('❌ Подключите кошелек');
                return;
            }
            if (!caseData.isFree && tonBalance < (caseData.price || 0)) {
                showMessage('❌ Недостаточно TON');
                return;
            }
            const availableRoom = await findAvailableRoom();
            if (availableRoom) {
                await joinRoom(availableRoom.id, availableRoom);
            } else {
                if (!caseData.isFree && caseData.price > 0) {
                    const success = await sendTransaction(caseData.price);
                    if (!success) return;
                }
                await createRoom();
            }
        };

        quickBtn.onclick = () => createBtn.onclick();
        refreshRoomsBtn.onclick = loadRooms;
        backBtn.onclick = hideBattleRoom;

        window.showAddBalance = function() {
            showMessage('💰 Функция пополнения будет доступна позже');
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        renderCases();
        loadRooms();
        updateUI();
        initTonConnect();

        setInterval(loadRooms, 10000);
    </script>
</body>
</html>
